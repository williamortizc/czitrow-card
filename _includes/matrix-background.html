<canvas class="matrix-field" id="matrixField" aria-hidden="true"></canvas>
<div class="scan-grid" aria-hidden="true"></div>

<script>
    (() => {
        const canvas = document.getElementById("matrixField");
        const context = canvas.getContext("2d");
        const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)");
        const glyphs = "01<>/{}[]#$CZITROWmatrixsudochmodgit";
        let columns = [];
        let width = 0;
        let height = 0;
        let frame = 0;
        let animationId = null;

        function resize() {
            const ratio = Math.min(window.devicePixelRatio || 1, 2);
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = Math.floor(width * ratio);
            canvas.height = Math.floor(height * ratio);
            canvas.style.width = `${width}px`;
            canvas.style.height = `${height}px`;
            context.setTransform(ratio, 0, 0, ratio, 0, 0);

            const columnWidth = width < 560 ? 18 : 22;
            const count = Math.ceil(width / columnWidth);
            columns = Array.from({ length: count }, (_, index) => ({
                x: index * columnWidth,
                y: Math.random() * height,
                speed: 1.5 + Math.random() * 3.5,
                size: 12 + Math.random() * 5,
                alpha: 0.25 + Math.random() * 0.55
            }));
        }

        function drawStaticField() {
            context.clearRect(0, 0, width, height);
            context.fillStyle = "rgba(0, 212, 170, 0.16)";
            context.font = "12px monospace";

            for (let y = 24; y < height; y += 34) {
                for (let x = 12; x < width; x += 48) {
                    const char = glyphs[(x + y) % glyphs.length];
                    context.fillText(char, x, y);
                }
            }
        }

        function draw() {
            frame += 1;
            context.fillStyle = "rgba(2, 5, 8, 0.16)";
            context.fillRect(0, 0, width, height);

            for (const column of columns) {
                const char = glyphs[Math.floor(Math.random() * glyphs.length)];
                context.font = `${column.size}px monospace`;
                context.fillStyle = `rgba(0, 255, 187, ${column.alpha})`;
                context.fillText(char, column.x, column.y);

                if (frame % 3 === 0) {
                    context.fillStyle = `rgba(255, 215, 96, ${column.alpha * 0.28})`;
                    context.fillText(char, column.x + 1, column.y - column.size);
                }

                column.y += column.speed;
                if (column.y > height + 80) {
                    column.y = -40 - Math.random() * height * 0.25;
                    column.speed = 1.5 + Math.random() * 3.5;
                    column.alpha = 0.25 + Math.random() * 0.55;
                }
            }

            animationId = requestAnimationFrame(draw);
        }

        function start() {
            cancelAnimationFrame(animationId);
            resize();

            if (prefersReducedMotion.matches) {
                drawStaticField();
                return;
            }

            context.fillStyle = "#020508";
            context.fillRect(0, 0, width, height);
            draw();
        }

        window.addEventListener("resize", resize);
        prefersReducedMotion.addEventListener("change", start);
        start();
    })();
</script>
